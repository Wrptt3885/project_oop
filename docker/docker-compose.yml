services:
  db:
    image: postgres:16-alpine
    container_name: nexfin-db
    environment:
      POSTGRES_DB: nexfin
      POSTGRES_USER: nexfin
      POSTGRES_PASSWORD: nexfin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexfin -d nexfin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: nexfin-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/nexfin
      SPRING_DATASOURCE_USERNAME: nexfin
      SPRING_DATASOURCE_PASSWORD: nexfin
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
